name: Tag

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-please:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump last segment with commit count and tag
        id: bump
        env:
          COMMITS: ${{ github.event.workflow_run.head_sha != '' && github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail
          COMMITS=$(git rev-list --count HEAD)
          VERSION="0.3.${COMMITS}"
          TAG="v${VERSION}"
          echo "Computed tag: ${TAG}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        run: |
          set -euo pipefail
          TAG="${{ steps.bump.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists; skipping."
            exit 0
          fi

      - name: Sync version into tauri.conf.json and Cargo.toml
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import os, re, pathlib
          ver = os.environ["VERSION"]
          # tauri.conf.json: "version": "0.3.0" -> "version": "0.3.107"
          tauri = pathlib.Path("src-tauri/tauri.conf.json")
          t = tauri.read_text()
          t2, n1 = re.subn(
              r'("version"\s*:\s*")0\.3\.\d+(")',
              lambda m: m.group(1) + ver + m.group(2),
              t, count=1)
          print(f"tauri.conf.json: {n1} substitution(s)")
          if t2 != t:
              tauri.write_text(t2)
          # Cargo.toml: first ^version = "0.3.0" -> ^version = "0.3.107" (in [package])
          cargo = pathlib.Path("src-tauri/Cargo.toml")
          c = cargo.read_text()
          c2, n2 = re.subn(
              r'^(version\s*=\s*")0\.3\.\d+(")',
              lambda m: m.group(1) + ver + m.group(2),
              c, count=1, flags=re.M)
          print(f"Cargo.toml: {n2} substitution(s)")
          if c2 != c:
              cargo.write_text(c2)
          # Sanity check
          assert n1 >= 1, "tauri.conf.json version line not found / not updated"
          assert n2 >= 1, "Cargo.toml version line not found / not updated"
          print(f"Synced to {ver}")
          PYEOF

      - name: Update release-please manifest
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          printf '{\n  "src-tauri": "%s"\n}\n' "${VERSION}" > release-please-manifest.json

      - name: Commit and push tag
        env:
          TAG: ${{ steps.bump.outputs.tag }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add release-please-manifest.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore(release): sync version to ${VERSION}" || echo "nothing to commit"

          git push origin HEAD:main

          # Create the tag locally and push
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
